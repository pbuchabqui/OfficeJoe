version: "3.9"

# Sobrescreve docker-compose.yml para desenvolvimento local com hot reload.
# Uso: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    volumes:
      - ./backend:/app
    command: >
      sh -c "
      alembic upgrade head &&
      python -m app.db.seed_admin &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
      "
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      LOG_LEVEL: debug

  frontend:
    build:
      target: builder
    volumes:
      - ./frontend:/app
      - /app/node_modules
    entrypoint: []
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: http://localhost:8000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]

  celery_worker:
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=debug
      --concurrency=1
      --queues=processing,default
      --prefetch-multiplier=1
    environment:
      LOG_LEVEL: debug

  celery_beat:
    command: celery -A app.tasks.celery_app beat --loglevel=debug --schedule=/tmp/celerybeat-schedule

  flower:
    environment:
      FLOWER_BASIC_AUTH: "admin:admin"
